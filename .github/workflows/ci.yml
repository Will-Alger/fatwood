# CI: every PR and push to main builds and tests the whole stack.
# No secrets, no cloud access — safe to run on forks.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "console;verbosity=normal"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check and build
        run: npm run build

  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compiles + lints the template without touching Azure.
      - name: Bicep build (lint)
        run: az bicep build --file infra/main.bicep --stdout > /dev/null
