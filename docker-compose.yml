services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: researchdb
      POSTGRES_USER: research
      # Dev-only credentials; production injects real secrets via environment.
      POSTGRES_PASSWORD: devonly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d researchdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=researchdb;Username=research;Password=devonly
      # Passed through from the host shell; empty when unset (analysis then
      # fails with an auth error on first use — browse/ingestion unaffected).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Dev-only admin key enabling the admin surface (settings, profile,
      # smart-search compile, analysis triggers). Paste the same value into
      # the UI's Settings panel. Use a real secret outside local dev.
      Admin__ApiKey: ${ADMIN_API_KEY:-local-dev-admin}
    ports:
      - "8080:8080"

volumes:
  pgdata:
