services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: researchdb
      POSTGRES_USER: research
      # Dev-only credentials; production injects real secrets via environment.
      POSTGRES_PASSWORD: devonly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d researchdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=researchdb;Username=research;Password=devonly
      # Passed through from the host shell; empty when unset (analysis then
      # fails with an auth error on first use — browse/ingestion unaffected).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Local personal stack: no Entra tenant, every request runs as the
      # local-dev admin. The flag is the deliberate opt-out of the
      # fail-closed production guard — never set it in cloud config. To
      # rehearse the real sign-in flow locally, set Auth__Authority and
      # Auth__Audience (values in infra/main.bicep) instead of the flag.
      Auth__DangerouslyAllowAnonymous: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
